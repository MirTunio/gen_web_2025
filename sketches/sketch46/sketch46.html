      .iframe-container {
        width: 100%;
        margin: 0;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Sketch native size is 500 x (433 + yspace ~= 17.32) = 500 x 450.32.
         The wrapper matches that aspect ratio and grows as large as it can
         within the available width and viewport height. The iframe fills the
         wrapper, and the canvas inside letterboxes to fit — nothing cropped. */
      #iframe-wrapper {
        width: 100%;
        max-width: calc(90vh * (500 / 450.32));
        aspect-ratio: 500 / 450.32;
        max-height: 90vh;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: transparent;
      }

      #iframe-wrapper iframe {

        height: 100%;
        border: none;
        display: block;
        background: transparent;
      }

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
      <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
      <span class="lightbox-arrow left" onclick="prevImage()">&#10094;</span>
      <span class="lightbox-arrow right" onclick="nextImage()">&#10095;</span>
      <img id="lightbox-img" src="" alt="Expanded view">
    </div>

    <footer><p></p></footer>
    
    <script>
  const allImages = Array.from(document.querySelectorAll('.gallery img, .inline-images img'));
  let currentIndex = 0;

  function openLightbox(src) {
    currentIndex = allImages.findIndex(img => img.src === src);
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }

  function nextImage() {
    currentIndex = (currentIndex + 1) % allImages.length;
    document.getElementById('lightbox-img').src = allImages[currentIndex].src;
  }

  function prevImage() {
    currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
    document.getElementById('lightbox-img').src = allImages[currentIndex].src;
  }

  allImages.forEach(img => {
    img.addEventListener('click', () => openLightbox(img.src));
  });

  document.addEventListener('keydown', (e) => {
    const lightbox = document.getElementById('lightbox');
    if (!lightbox.classList.contains('active')) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
  });
</script>
